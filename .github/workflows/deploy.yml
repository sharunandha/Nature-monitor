name: Deploy

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.HOST != '' && secrets.HOST || secrets.SSH_HOST }}
      DEPLOY_USER: ${{ secrets.USERNAME != '' && secrets.USERNAME || secrets.SSH_USERNAME }}
      DEPLOY_KEY: ${{ secrets.SSH_KEY }}

    steps:
    - uses: actions/checkout@v2

    - name: Validate deployment secrets
      run: |
        missing=0
        if [ -z "${DEPLOY_HOST}" ]; then
          echo "::error::Missing SSH host secret. Set HOST or SSH_HOST in repository secrets."
          missing=1
        fi
        if [ -z "${DEPLOY_USER}" ]; then
          echo "::error::Missing SSH username secret. Set USERNAME or SSH_USERNAME in repository secrets."
          missing=1
        fi
        if [ -z "${DEPLOY_KEY}" ]; then
          echo "::error::Missing SSH private key secret. Set SSH_KEY in repository secrets."
          missing=1
        fi
        if [ "$missing" -ne 0 ]; then
          exit 1
        fi

    - name: Setup Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '18'

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm install

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm install

    - name: Build Frontend
      run: |
        cd frontend
        npm run build

    - name: Run Tests
      run: |
        cd backend
        npm test || true
        cd ../frontend
        npm test || true

    - name: Upload to Deployment Server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ env.DEPLOY_HOST }}
        username: ${{ env.DEPLOY_USER }}
        key: ${{ env.DEPLOY_KEY }}
        script: |
          cd flood-warning-system
          git pull origin main
          cd backend && npm install && npm start &
          cd ../frontend && npm install && npm run build
